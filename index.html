<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Buku — Penerbit Alinea</title>
<meta name="description" content="Katalog lengkap buku-buku terbitan Penerbit Alinea">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary:   #1a3a5c;
    --accent:    #c8932a;
    --wa:        #25d366;
    --wa-dark:   #1aab53;
    --bg:        #f5f6f8;
    --card-bg:   #ffffff;
    --text:      #1e1e1e;
    --muted:     #6b7280;
    --border:    #e2e5ea;
    --radius:    10px;
    --shadow:    0 2px 12px rgba(0,0,0,.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.16);
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--primary);
    color: #fff;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header img.logo {
    height: 42px;
    object-fit: contain;
  }
  .brand h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
  .brand p  { font-size: .75rem; opacity: .75; margin-top: 1px; }

  /* ── Toolbar ── */
  .toolbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar input {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: .9rem;
    outline: none;
    transition: border-color .2s;
  }
  .toolbar input:focus { border-color: var(--primary); }
  .toolbar select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: .85rem;
    background: #fff;
    cursor: pointer;
    outline: none;
  }
  .count { font-size: .82rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .cover-wrap {
    position: relative;
    aspect-ratio: 3/4;
    background: #e9ecef;
    overflow: hidden;
  }
  .cover-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity .2s;
  }
  .badge-new {
    position: absolute; top: 8px; left: 8px;
    background: var(--accent); color: #fff;
    font-size: .65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .badge-soon {
    position: absolute; top: 8px; right: 8px;
    background: #64748b; color: #fff;
    font-size: .65rem; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
  }
  .cover-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #dce3ef 0%, #c9d3e8 100%);
  }
  .cover-placeholder span {
    font-size: .7rem; color: #7a8ba8; text-align: center;
    padding: 8px; line-height: 1.4;
  }
  .card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .card-title { font-size: .82rem; font-weight: 700; line-height: 1.35; color: var(--text); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-author { font-size: .73rem; color: var(--muted); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-price { margin-top: auto; padding-top: 6px; font-size: .88rem; font-weight: 700; color: var(--primary); }
  .card-price.free { color: var(--muted); font-weight: 400; font-size: .78rem; }

  /* ── Empty / Loading ── */
  .state-msg {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 200;
    padding: 20px;
    overflow-y: auto;
    align-items: flex-start;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    margin: auto;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slideUp .22s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .modal-inner {
    display: flex;
    gap: 0;
  }
  .modal-cover {
    width: 220px;
    flex-shrink: 0;
    background: #e9ecef;
  }
  .modal-cover img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .modal-cover .cover-placeholder { height: 100%; min-height: 280px; }
  .modal-info {
    flex: 1;
    padding: 24px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(0,0,0,.4);
    border: none; color: #fff;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: rgba(0,0,0,.7); }
  .modal-overlay { position: relative; } /* for close button */
  .modal { position: relative; }

  .modal-category {
    font-size: .72rem; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; color: var(--accent);
  }
  .modal-title {
    font-size: 1.05rem; font-weight: 800; line-height: 1.4;
    color: var(--primary);
  }
  .modal-author { font-size: .83rem; color: var(--muted); }
  .modal-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 2px;
  }
  .meta-chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 9px;
    font-size: .72rem; color: var(--muted);
  }
  .modal-desc {
    font-size: .82rem; line-height: 1.6; color: #444;
    max-height: 120px; overflow-y: auto;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 2px;
  }
  .modal-price {
    font-size: 1.3rem; font-weight: 800; color: var(--primary);
    margin-top: 4px;
  }
  .modal-price.free { font-size: .88rem; color: var(--muted); font-weight: 400; }

  /* ── Action buttons ── */
  .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: .85rem; font-weight: 600;
    border: none; cursor: pointer;
    text-decoration: none;
    transition: filter .15s, transform .1s;
  }
  .btn:hover { filter: brightness(.92); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-wa    { background: var(--wa); color: #fff; }
  .btn-shopee   { background: #ee4d2d; color: #fff; }
  .btn-tokopedia{ background: #03ac0e; color: #fff; }
  .btn-tiktok   { background: #010101; color: #fff; }
  .btn-copy  {
    background: #fff; color: var(--primary);
    border: 1.5px solid var(--primary);
  }
  .btn-copy.copied { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
  .shop-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .shop-row .btn { flex: 1; min-width: 100px; }

  /* ── Responsive ── */
  @media (max-width: 580px) {
    .modal-inner { flex-direction: column; }
    .modal-cover { width: 100%; max-height: 260px; }
    .modal-cover img { object-position: top; }
    .modal-info { padding: 16px; }
    .grid { padding: 14px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.svg" alt="Penerbit Alinea"
       onerror="this.src='logo.png'; this.onerror=function(){this.style.display='none'}">
  <div class="brand">
    <h1>Penerbit Alinea</h1>
    <p>Katalog Buku</p>
  </div>
</header>

<div class="toolbar">
  <input id="searchInput" type="search" placeholder="Cari judul, penulis, atau ISBN…">
  <select id="catFilter">
    <option value="">Semua Kategori</option>
  </select>
  <select id="statusFilter">
    <option value="">Semua Status</option>
    <option value="available">Tersedia</option>
    <option value="soon">Coming Soon</option>
  </select>
  <span class="count" id="countLabel"></span>
</div>

<div class="grid" id="grid">
  <div class="state-msg">
    <div class="spinner"></div>
    <p>Memuat katalog…</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" title="Tutup">✕</button>
    <div class="modal-inner">
      <div class="modal-cover" id="modalCover"></div>
      <div class="modal-info" id="modalInfo"></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
// Ganti URL ini setelah Apps Script di-deploy sebagai Web App
const API_URL = "https://script.google.com/macros/s/AKfycbyBJJRdGD1szSUgl8QYsCbCQU5bsm_JcU3zUR5OJtwI3_ri1LisgcQ4a68FG2puipIsxg/exec";
const WA_NUMBER = "6282243813872";
const COVER_BASE = "covers/"; // prefix path cover image

// ── STATE ────────────────────────────────────────────────────
let allBooks = [];

// ── FETCH DATA ───────────────────────────────────────────────
async function loadBooks() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    allBooks   = data.books || [];
    buildCategoryFilter(data.categories || []);
    render();
  } catch (err) {
    document.getElementById("grid").innerHTML =
      `<div class="state-msg">⚠️ Gagal memuat data. Pastikan Apps Script sudah di-deploy.<br><small>${err.message}</small></div>`;
  }
}

// ── CATEGORY FILTER ───────────────────────────────────────────
function buildCategoryFilter(cats) {
  const sel = document.getElementById("catFilter");
  cats.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

// ── RENDER GRID ───────────────────────────────────────────────
function render() {
  const q      = document.getElementById("searchInput").value.toLowerCase();
  const cat    = document.getElementById("catFilter").value;
  const status = document.getElementById("statusFilter").value;

  let books = allBooks.filter(b => {
    const matchQ = !q ||
      b.title.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q) ||
      b.isbn.includes(q);
    const matchCat    = !cat    || b.category === cat;
    const matchStatus = !status ||
      (status === "available" && !b.coming_soon) ||
      (status === "soon"      &&  b.coming_soon);
    return matchQ && matchCat && matchStatus;
  });

  document.getElementById("countLabel").textContent =
    `${books.length} dari ${allBooks.length} judul`;

  const grid = document.getElementById("grid");
  if (!books.length) {
    grid.innerHTML = `<div class="state-msg">Buku tidak ditemukan.</div>`;
    return;
  }

  grid.innerHTML = books.map(b => `
    <div class="card" onclick="openModal('${b.slug}')">
      <div class="cover-wrap">
        ${b.cover_image
          ? `<img src="${COVER_BASE}${b.cover_image}" alt="${escHtml(b.title)}"
                  loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=cover-placeholder><span>${escHtml(b.title)}</span></div>'">`
          : `<div class="cover-placeholder"><span>${escHtml(b.title)}</span></div>`
        }
        ${b.is_new      ? `<span class="badge-new">Baru</span>`        : ""}
        ${b.coming_soon ? `<span class="badge-soon">Coming Soon</span>` : ""}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(b.title)}</div>
        <div class="card-author">${escHtml(b.author)}</div>
        <div class="card-price ${b.price ? '' : 'free'}">
          ${b.price ? "Rp " + b.price.toLocaleString("id-ID") : "Segera hadir"}
        </div>
      </div>
    </div>
  `).join("");
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(slug) {
  const b = allBooks.find(x => x.slug === slug);
  if (!b) return;

  // Update URL hash tanpa reload
  history.pushState(null, "", `#${slug}`);

  // Cover
  document.getElementById("modalCover").innerHTML = b.cover_image
    ? `<img src="${COVER_BASE}${b.cover_image}" alt="${escHtml(b.title)}"
            onerror="this.parentElement.innerHTML='<div class=cover-placeholder style=height:100%;min-height:280px><span>${escHtml(b.title)}</span></div>'">`
    : `<div class="cover-placeholder" style="height:100%;min-height:280px"><span>${escHtml(b.title)}</span></div>`;

  // Share link (URL halaman dengan hash slug)
  const shareUrl = `${location.origin}${location.pathname}#${slug}`;

  // WhatsApp pesan
  const waMsg = encodeURIComponent(
    `Halo Penerbit Alinea, saya ingin memesan buku:\n*${b.title}*\n\nMohon informasi ketersediaan dan cara pemesanannya. Terima kasih.`
  );
  const waLink = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;

  // Tombol marketplace
  const marketBtns = [
    b.links?.shopee    ? `<a href="${b.links.shopee}"    target="_blank" rel="noopener" class="btn btn-shopee">Shopee</a>`    : "",
    b.links?.tokopedia ? `<a href="${b.links.tokopedia}" target="_blank" rel="noopener" class="btn btn-tokopedia">Tokopedia</a>` : "",
    b.links?.tiktok    ? `<a href="${b.links.tiktok}"    target="_blank" rel="noopener" class="btn btn-tiktok">TikTok Shop</a>` : "",
  ].filter(Boolean).join("");

  document.getElementById("modalInfo").innerHTML = `
    <div class="modal-category">${escHtml(b.category)}</div>
    <div class="modal-title">${escHtml(b.title)}</div>
    <div class="modal-author">${escHtml(b.author)}</div>
    <div class="modal-meta">
      ${b.isbn  ? `<span class="meta-chip">ISBN: ${escHtml(b.isbn)}</span>`    : ""}
      ${b.pages ? `<span class="meta-chip">${b.pages} hlm.</span>`             : ""}
      ${b.size  ? `<span class="meta-chip">${escHtml(b.size)}</span>`           : ""}
    </div>
    ${b.description ? `<div class="modal-desc">${escHtml(b.description)}</div>` : ""}
    <div class="modal-price ${b.price ? '' : 'free'}">
      ${b.price ? "Rp " + b.price.toLocaleString("id-ID") : "Harga segera diumumkan"}
    </div>
    <div class="modal-actions">
      <a href="${waLink}" target="_blank" rel="noopener" class="btn btn-wa">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.853L.057 23.526a.5.5 0 0 0 .617.617l5.656-1.48A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.028-1.382l-.36-.214-3.733.977.997-3.648-.235-.374A9.818 9.818 0 1 1 12 21.818z"/></svg>
        Beli via WhatsApp
      </a>
      ${marketBtns ? `<div class="shop-row">${marketBtns}</div>` : ""}
      <button class="btn btn-copy" id="copyBtn" onclick="copyLink('${shareUrl}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Salin Link Produk
      </button>
    </div>
  `;

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
  history.pushState(null, "", location.pathname);
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("copyBtn");
    if (!btn) return;
    btn.classList.add("copied");
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Link Disalin!`;
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Salin Link Produk`;
    }, 2500);
  });
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("input", render);
document.getElementById("catFilter").addEventListener("change", render);
document.getElementById("statusFilter").addEventListener("change", render);
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// Buka modal dari hash URL (deep link)
window.addEventListener("load", () => {
  const hash = location.hash.slice(1);
  if (hash && allBooks.length) openModal(hash);
});

// ── INIT ──────────────────────────────────────────────────────
loadBooks();
</script>
</body>
</html>
